<!--  SIDEBAR DROPDOWN & SUB-MENU NAVIGATION LOGIC     -->
<!-- ═══════════════════════════════════════════════════ -->
<script>
  /**
   * toggleDropdown(dropdownId)
   * Buka/tutup panel sub-menu dropdown dengan animasi max-height + opacity.
   * Chevron icon akan berputar 180° saat panel terbuka.
   */
  function toggleDropdown(dropdownId) {
    var dropdown = document.getElementById(dropdownId);
    var chevron = document.getElementById('chevron-' + dropdownId);
    if (!dropdown) return;

    var isOpen = dropdown.classList.contains('dropdown-open');

    if (isOpen) {
      // === TUTUP DROPDOWN ===
      dropdown.style.maxHeight = '0px';
      dropdown.style.opacity = '0';
      dropdown.classList.remove('dropdown-open');
      if (chevron) chevron.style.transform = 'rotate(0deg)';
    } else {
      // === BUKA DROPDOWN ===
      dropdown.style.maxHeight = dropdown.scrollHeight + 'px';
      dropdown.style.opacity = '1';
      dropdown.classList.add('dropdown-open');
      if (chevron) chevron.style.transform = 'rotate(180deg)';
    }
  }

  /**
   * navigateSubMenu(pageId, clickedElement)
   * 1. Panggil switchPage() bawaan proyek untuk berpindah halaman.
   * 2. Auto-buka dropdown parent jika sedang tertutup.
   * 3. Beri penanda visual aktif (amber gold) pada sub-menu yang diklik.
   * 4. Highlight parent menu-inventory sebagai aktif.
   */
  function navigateSubMenu(pageId, clickedElement) {
    // 1. Pindah halaman via fungsi bawaan switchPage()
    switchPage(pageId);

    // 2. Pastikan dropdown terbuka setelah navigasi
    var dropdown = document.getElementById('inventory-dropdown');
    var chevron = document.getElementById('chevron-inventory-dropdown');
    if (dropdown && !dropdown.classList.contains('dropdown-open')) {
      dropdown.style.maxHeight = dropdown.scrollHeight + 'px';
      dropdown.style.opacity = '1';
      dropdown.classList.add('dropdown-open');
      if (chevron) chevron.style.transform = 'rotate(180deg)';
    }

    // 3. Reset semua sub-menu item ke state default
    var allSubItems = document.querySelectorAll('.sidebar-submenu-item');
    allSubItems.forEach(function(item) {
      item.classList.remove('submenu-active');
    });

    // 4. Beri status aktif pada sub-menu yang diklik
    if (clickedElement) {
      clickedElement.classList.add('submenu-active');
    }

    // 5. Re-highlight parent menu-inventory (switchPage sudah handle ini via
    //    querySelector string matching, tapi kita pastikan ulang)
    var parentMenu = document.getElementById('menu-inventory');
    if (parentMenu) {
      parentMenu.classList.remove('sidebar-menu-default');
      parentMenu.classList.add('sidebar-menu-active');
    }
  }

  /**
   * handleLogout()
   * Mengeluarkan pengguna dari dashboard dengan konfirmasi dialog SweetAlert2 premium.
   */
  function handleLogout() {
    Swal.fire({
      title: 'Logout dari Dashboard?',
      text: "Anda akan keluar dari sesi IT Admin Hub saat ini.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#e11d48', // rose-600 (exit red tint)
      cancelButtonColor: '#004684', // brand-primary
      confirmButtonText: 'Ya, Logout',
      cancelButtonText: 'Batal',
      background: '#ffffff',
      customClass: {
        popup: 'rounded-2xl border border-gray-100 shadow-xl',
        title: 'text-brand-primary font-bold text-xl',
        htmlContainer: 'text-gray-500 text-sm font-medium',
        confirmButton: 'rounded-xl px-5 py-2.5 text-xs font-bold uppercase tracking-wider',
        cancelButton: 'rounded-xl px-5 py-2.5 text-xs font-bold uppercase tracking-wider'
      }
    }).then((result) => {
      if (result.isConfirmed) {
        Swal.fire({
          title: 'Berhasil Logout',
          text: 'Kembali ke halaman login...',
          icon: 'success',
          timer: 1500,
          showConfirmButton: false,
          background: '#ffffff',
          customClass: {
            popup: 'rounded-2xl border border-gray-100 shadow-xl'
          }
        }).then(() => {
          // Panggil backend Google Apps Script untuk mereload halaman web app dengan aman
          google.script.run.withSuccessHandler(function(url) {
            window.top.location.href = url;
          }).getWebAppUrl();
        });
      }
    });
  }
</script>
